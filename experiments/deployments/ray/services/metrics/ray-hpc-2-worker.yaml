apiVersion: v1
kind: Endpoints
metadata:
   name: ray-hpc-2-metrics-worker
subsets:
  - addresses:
    - ip: '192.168.1.19'
    ports: 
      - port: 8254
---
apiVersion: v1
kind: Service
metadata:
   name: ray-hpc-2-metrics-worker 
   annotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port: '8254'
spec:
   type: ClusterIP
   ports:
   - protocol: TCP
     port: 8254
     targetPort: 8254
