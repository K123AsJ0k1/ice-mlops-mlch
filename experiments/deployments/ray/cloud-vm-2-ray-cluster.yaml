networks:
  study_network:
    driver: bridge 
    ipam:
      config:
        - subnet: 172.29.0.0/16

services:
  ray-head:
    image: rayproject/ray:2.49.0.5531bc-py312-cpu
    container_name: ray-head
    hostname: ray-head
    restart: no
    ports:
      - '127.0.0.1:6379:6379'
      - '127.0.0.1:8265:8265'
      - '127.0.0.1:8200:8200'
      - '127.0.0.1:8350:8350'
      - '127.0.0.1:10001:10001'
    shm_size: '5gb'
    command: bash -c "ray start --head --num-cpus=3 --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --metrics-export-port=8200 --ray-client-server-port=10001 --block"
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: '14g'
    networks:
      study_network:
        ipv4_address: 172.29.0.15
  ray-worker:
    image: rayproject/ray:2.49.0.5531bc-py312-cpu
    container_name: ray-worker
    hostname: ray-worker
    depends_on:
      - ray-head
    shm_size: '5gb'
    command: bash -c "ray start --num-cpus=3 --address=ray-head:6379 --block"
    deploy:
      mode: replicated
      replicas: '1'
      resources:
        limits:
         cpus: '3'
         memory: '14g'
    networks:
      - study_network