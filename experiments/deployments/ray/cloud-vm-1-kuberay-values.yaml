      cpu: "4"
      memory: "52G"
      nvshare.com/gpu: "1"
    requests:
      cpu: "4"
      memory: "52G"
  volumes:
    - name: log-volume
      emptyDir: {}
  volumeMounts:
    - mountPath: /tmp/ray
      name: log-volume