[project] 
name = "icebreaker"
version = "0.0.1"
description = "Abstraction functions that make integrating computing enviroments (ICE) easier"
dependencies = [
    "pydantic"
]

[tool.setuptools.packages.find]
where = ["src"]

[project.optional-dependencies]

notebook = [
    "apache-airflow-client==3.0.2",
    "kfp==2.16.1"
]

yaml = [
    "PyYAML"
]

env = [
    "python-decouple"
]

swift = [
    "python-swiftclient",
    "keystoneauth1",
    "python-keystoneclient"
]

data = [
    "pandas",
    "pyarrow"
]

lang_detect = [
    "fasttext-wheel"
]

code_detect = [
    "magika"
]

redis = [
    "redis==7.3.0"
]

flower = [
    "flower"
]

ray = [
    "ray[default]==2.49.2"
]

pararellism = [
    "numpy"
]

logging = [
    "mlflow==3.12.0"
]

all = [
    "icebreaker[notebook, swift, data, lang_detect, code_detect, redis, flower, ray, pararellism, logging]"
]