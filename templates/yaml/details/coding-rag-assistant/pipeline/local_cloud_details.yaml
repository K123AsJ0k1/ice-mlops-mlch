          bucket-user: 'user@example.com'   
          object-prefix: 'openai-humaneval'
      model:
        bucket-name: 'mlch-exp-user-example-com'
        object-path: 'MODELS/fasttext/lid.176.bin'
      data:
        analysis-parameters:
          language-default: 'en'
          language-column: 'question'
          language-threshold: 0.68
          language-replacer: {}
          format-default: 'python'
          format-column: 'question'
          format-threshold: 0.80
          format-replacer: {}
    cluster:
      cloud-vm1:
        process:
          worker-number: 4
          actor-number: 2
        job:
          main-file: 'external_data_analysis.py'
          runtime:
            working_dir: 'data-analysis-script-2'
            pip: 'data-analysis-script-2/requirements.txt'
