storage:
  data-storage: 
    bucket-target: 'experiment'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  code-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  log-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  time-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
    object-name: 'local-cloud-workflow'
integration:
  cluster-name: 'local-cloud-cluster'
  resource-weights:
    cpu: 0.30
    gpu: 0.30
    vram: 0.10 
    ram: 0.30
  cluster-priority:
    cloud-vm1: 0.04
    cloud-vm2: 0.04
    local-lt1: 0.02
    local-lt2: 0.40
    local-lt3: 0.50
  hardware-influence: 0.2
  min-initial-inputs: 1
  min-batch-size: 1
  workflow-steps: []
  multi-loop-amount: 20000
  multi-loop-wait: 10
  job-loop-amount: 2
  job-loop-wait: 5
processing:
  step-1:
    general:
      swift: {}
      data-storage: 
        bucket-target: 'experiment'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com'   
        object-prefix: '.parquet' 
      time-storage: 
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-workflow'
      result-storage:
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-evalution-dataset'
      model:
        bucket-name: 'mlch-exp-user-example-com'
        object-path: 'MODELS/fasttext/lid.176.bin'
      config:
        dataset-parameters:
          target-rows: 1600
        analysis-parameters:
          language-default: 'en'
          language-column: 'question'
          language-threshold: 0.20
          language-replacer: {}
          format-default: 'txt'
          format-column: 'answer'
          format-threshold: 0.20
          format-replacer: {}
        filter-parameters:
          allowed-languages: []
          allowed-formats: []
    cluster:
      cloud-vm1:
        process:
          workers: 6
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'requirements.txt'
      cloud-vm2:
        process:
          workers: 10
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'requirements.txt'
      local-lt1:
        process:
          workers: 10
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'requirements.txt'
      local-lt2:
        process:
          workers: 12
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'requirements.txt'
      local-lt3:
        process:
          workers: 28
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'requirements.txt'
  step-2:
    general:
      swift: {}
      collection-name: 'fill'
      data-storage: 
        bucket-target: 'experiment'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com'   
        object-prefix: 'fill'
        object-serialization: 'pickle'
      time-storage: 
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-workflow'
      model:
        dense-model-name: 'BAAI/bge-m3'
        sparse-model-name: 'prithivida/Splade_PP_en_v1'
      config:
        text-column: 'content'
    cluster:
      cloud-vm1:
        qdrant: 
          address: 'qdrant-service.storage.svc.cluster.local'
          port: '7201'
          api-key: 'qdrant_key'
        process:
          vector-batch-size: 32
          workers: 6
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
            pip: 'c-vm1-requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'
      local-lt2:
        qdrant: 
          address: 'chisel-client'
          port: '7201'
          api-key: 'qdrant_key'
        process:
          vector-batch-size: 8
          workers: 12
          actors: 1
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
            pip: 'l-lt23-requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'
      local-lt3:
        qdrant: 
          address: 'chisel-client'
          port: '7201'
          api-key: 'qdrant_key'
        process:
          vector-batch-size: 32
          workers: 28
          actors: 1
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
            pip: 'l-lt23-requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'
  step-3:
    general:
      swift: {}
      data-storage: 
        bucket-target: 'experiment'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com'   
        object-prefix: 'ICEbreaker-tutorial'
      time-storage: 
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-workflow'    
      model:
        generator-id: 'unsloth/DeepSeek-R1-Distill-Llama-8B-GGUF'
        generator-file: '*Q4_K_M.gguf'
        generator-model-parameters: 
          n-gpu-layers: -1
          n-ctx: 4096
        generator-prompt-parameters: {}
    cluster:
      cloud-vm1:
        process:
          workers: 6
          actors: 1
        serve:
          host: '0.0.0.0'
          port: 8000
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'llm_inference_server'
            pip: 'requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'
      local-lt2:
        process:
          workers: 12
          actors: 1
        serve:
          host: '0.0.0.0'
          port: 8000
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'validation_dataset_creation'
            pip: 'validation_dataset_creation/requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'
      local-lt3:
        process:
          workers: 28
          actors: 2
        serve:
          host: '0.0.0.0'
          port: 8000
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'validation_dataset_creation'
            pip: 'validation_dataset_creation/requirements.txt'
            env_vars:
              HF_TOKEN: 'fill'