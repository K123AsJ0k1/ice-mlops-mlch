storage:
  swift: {}
  data-storage: 
    bucket-target: 'experiment'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  code-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  log-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  time-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
    object-name: 'local-cloud-workflow'
integration:
  cluster-name: 'local-cloud-cluster'
  resource-weights:
    cpu: 0.30
    gpu: 0.30
    vram: 0.10 
    ram: 0.30
  cluster-priority:
    cloud-vm1: 0.20
    cloud-vm2: 0.10
    local-lt1: 0.10
    local-lt2: 0.25
    local-lt3: 0.25
  hardware-influence: 0.5
  min-initial-inputs: 1
  min-batch-size: 1
  workflow-steps: []
  multi-loop-amount: 20000
  multi-loop-wait: 10
  job-loop-amount: 2
  job-loop-wait: 5
processing:
  step-1:
    general:
      swift: {}
      data-storage: 
        bucket-target: 'experiment'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com'   
        object-prefix: '.parquet' 
      time-storage: 
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-workflow'
      result-storage:
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-evalution-dataset'
      model:
        bucket-name: 'mlch-exp-user-example-com'
        object-path: 'MODELS/fasttext/lid.176.bin'
      config:
        analysis-parameters:
          language-default: 'en'
          language-column: 'question'
          language-threshold: 0.20
          language-replacer: {}
          format-default: 'txt'
          format-column: 'answer'
          format-threshold: 0.20
          format-replacer: {}
        filter-parameters:
          allowed-languages: ['en']
          allowed-formats: ['python', 'bash', 'yaml', 'markdown']
    cluster:
      cloud-vm1:
        process:
          workers: 6
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'evalution_dataset_creation/requirements.txt'
      cloud-vm2:
        process:
          workers: 10
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'evalution_dataset_creation/requirements.txt'
      local-lt1:
        process:
          workers: 10
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'evalution_dataset_creation/requirements.txt'
      local-lt2:
        process:
          workers: 12
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'evalution_dataset_creation/requirements.txt'
      local-lt3:
        process:
          workers: 28
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'evalution_dataset_creation'
            pip: 'evalution_dataset_creation/requirements.txt'
  step-2:
    general:
      swift: {}
      data-storage: 
        bucket-target: 'experiment'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com'   
        object-prefix: 'ICEbreaker-tutorial'
      time-storage: 
        bucket-target: 'pipeline'
        bucket-prefix: 'mlch'
        bucket-user: 'user@example.com' 
        object-name: 'local-cloud-workflow'
      model:
        bucket-name: 'mlch-exp-user-example-com'
        object-path: 'MODELS/fasttext/lid.176.bin'
    cluster:
      cloud-vm1:
        process:
          workers: 6
          actors: 2
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
            pip: 'rag_database_setup/requirements.txt'
      local-lt2:
        process:
          workers: 12
          actors: 1
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
            pip: 'rag_database_setup/requirements.txt'
      local-lt3:
        process:
          workers: 28
          actors: 1
        job:
          main-file: 'main.py'
          runtime:
            working_dir: 'rag_database_setup'
