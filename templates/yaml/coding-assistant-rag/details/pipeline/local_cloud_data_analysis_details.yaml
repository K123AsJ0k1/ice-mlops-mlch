    bucket-target: 'experiment'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com'   
  code-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  log-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
  time-storage: 
    bucket-target: 'pipeline'
    bucket-prefix: 'mlch'
    bucket-user: 'user@example.com' 
    object-name: 'local-cloud-workflow'
integration:
  cluster-name: 'local-cloud-cluster'
  resource-weights:
    nodes: 0.2
    cpu: 0.3 
    ram: 0.4
    gpu: 0.05
    vram: 0.05
  multi-loop-amount: 20000
  multi-loop-wait: 10
  job-loop-amount: 2
  job-loop-wait: 5
