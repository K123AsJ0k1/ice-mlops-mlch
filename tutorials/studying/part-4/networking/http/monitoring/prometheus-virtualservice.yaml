apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-virtualservice
spec:
  hosts:
  - "prometheus.oss"
  gateways:
  - dashboards-gateway-1
  http:
  - route:
    - destination:
        host: prometheus-service.monitoring.svc.cluster.local
        port:
          number: 8080