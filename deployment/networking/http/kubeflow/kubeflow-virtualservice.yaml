apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kubeflow-virtualservice
spec:
  hosts:
  - "kubeflow.oss"
  gateways:
  - dashboards-gateway-1
  http:
  - route:
    - destination:
        host: ml-pipeline-ui.kubeflow.svc.cluster.local
        port:
          number: 80