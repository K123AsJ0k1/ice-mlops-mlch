apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-airflow-server
  labels:
    app: postgres-airflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-airflow-server
  template:
    metadata:
      labels:
        app: postgres-airflow-server
    spec:
      containers:
        - name: postgres-airflow-server
          image: postgres:13
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "airflow"
            - name: POSTGRES_PASSWORD
              value: "airflow"
            - name: POSTGRES_DB
              value: "airflow"
          volumeMounts:
            - name: postgres-airflow-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-airflow-data
          persistentVolumeClaim:
            claimName: postgres-airflow-pvc
  