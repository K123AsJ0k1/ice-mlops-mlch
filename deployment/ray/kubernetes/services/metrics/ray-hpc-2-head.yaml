   name: ray-hpc-2-metrics-head
   annotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port: '8253'
spec:
   type: ClusterIP
   ports:
   - protocol: TCP
     port: 8253
     targetPort: 8253
